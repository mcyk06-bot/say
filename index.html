<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Say Goodnight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DotGothic16&family=Noto+Sans+JP:wght@400;700;900&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --night:  #0a0a12;
  --panel:  #12121e;
  --border: #2a2a44;
  --amber:  #ff6600;
  --gold:   #ffcc00;
  --cream:  #ffffff;
  --rust:   #ff2255;
  --sage:   #00dd88;
  --muted:  #7777aa;
  --dim:    #2a2a44;
  --text:   #ccccff;
}
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
body {
  background: var(--night);
  color: var(--text);
  min-height: 100vh;
  font-family: 'Noto Sans JP', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#app {
  width: 100%;
  max-width: 440px;
  min-height: 100dvh;
  padding: 28px 22px 24px;
  display: flex;
  flex-direction: column;
  position: relative;
}
.screen { width: 100%; display: flex; flex-direction: column; flex: 1; }
.hidden { display: none !important; }

/* ━━━━━ TITLE ━━━━━ */
#scr-title {
  align-items: center;
  justify-content: center;
}
.t-eyebrow {
  font-family: 'DotGothic16', monospace;
  font-size: 0.68em; letter-spacing: 0.25em;
  color: var(--muted); margin-bottom: 14px; text-transform: uppercase;
}
.t-main {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300; font-style: italic; font-size: 3.2em;
  color: var(--cream); letter-spacing: 0.02em; line-height: 1;
  margin-bottom: 4px; text-align: center;
  text-shadow: 0 0 20px rgba(255,204,0,0.3);
}
.t-sub {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 400; font-size: 0.78em;
  color: var(--muted); letter-spacing: 0.3em; margin-bottom: 28px;
}
.t-rule-box {
  width: 100%; border: 1px solid var(--border); border-radius: 2px;
  padding: 16px 18px; margin-bottom: 26px;
  font-size: 0.78em; line-height: 2.1; color: #111; font-weight: 700; font-family: 'Noto Sans JP', sans-serif;
}
.t-rule-box .hi  { color: #b06000; font-weight: 900; }
.t-rule-box .red { color: #cc0033; font-weight: 900; }
.t-rule-box .grn { color: #007744; font-weight: 900; }
.sec-label {
  width: 100%; text-align: left;
  font-family: 'DotGothic16', monospace; font-size: 0.6em;
  color: var(--muted); letter-spacing: 0.25em; margin-bottom: 12px; text-transform: uppercase;
}
.lv-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; margin-bottom: 20px; }
.lv-btn {
  aspect-ratio: 1; background: var(--panel); border: 1px solid var(--border);
  border-radius: 2px; color: var(--muted); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; transition: all 0.18s; font-family: 'Noto Sans JP', sans-serif;
}
.lv-btn .n { font-size: 1.3em; font-weight: 700; color: var(--text); line-height: 1; }
.lv-btn .s { font-family: 'Space Mono', monospace; font-size: 0.52em; color: var(--sage); }
.lv-btn:hover:not(.locked) { border-color: var(--amber); background: rgba(200,144,60,0.06); }
.lv-btn.sel   { border-color: var(--amber); background: rgba(200,144,60,0.08); }
.lv-btn.sel .n { color: var(--gold); }
.lv-btn.done  { border-color: var(--dim); }
.lv-btn.locked { opacity: 0.2; cursor: not-allowed; }
.btn-start {
  width: 100%; padding: 15px; background: transparent;
  border: 1px solid var(--amber); border-radius: 2px;
  color: var(--amber); font-family: 'Noto Sans JP', sans-serif;
  font-weight: 900; font-size: 1.1em;
  letter-spacing: 0.3em; cursor: pointer; transition: all 0.22s;
}
.btn-start:hover  { background: var(--amber); color: var(--night); }
.btn-start:active { transform: scale(0.98); }

/* ━━━━━ GAME ━━━━━ */
#scr-game { justify-content: center; position: relative; padding-top: 20px; }

.g-meta {
  display: flex; justify-content: space-between; align-items: baseline;
  width: 100%; margin-bottom: 14px;
}
.g-lv  { font-family: 'DotGothic16', monospace; font-size: 0.9em; color: var(--amber); letter-spacing: 0.06em; }
.g-q   { font-family: 'DotGothic16', monospace; font-size: 0.65em; color: var(--text); }
.btn-sound {
  background: transparent; border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 7px; font-size: 0.85em;
  cursor: pointer; color: var(--muted); transition: all 0.15s;
  line-height: 1.4;
}
.btn-sound:hover { border-color: var(--gold); }
.btn-sound.muted { opacity: 0.35; }
.g-sc  { font-family: 'DotGothic16', monospace; font-size: 0.72em; color: var(--gold); }

.g-dots { display: flex; gap: 5px; width: 100%; margin-bottom: 12px; }
.dot { flex: 1; height: 2px; background: var(--dim); transition: background 0.3s; }
.dot.cur { background: var(--amber); }
.dot.ok  { background: var(--sage); }
.dot.ng  { background: var(--rust); }

.timer-track {
  width: 100%; height: 2px; background: var(--dim);
  margin-bottom: 0; position: relative; overflow: visible;
  margin-top: 4px;
}
.timer-fill { height: 2px; width: 100%; background: var(--amber); transform-origin: left; }
.timer-glow {
  position: absolute; right: 0; top: -3px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--amber); box-shadow: 0 0 10px var(--amber);
  transform: translateX(4px); pointer-events: none;
}

/* words — fixed height, fully centered */
.words-area {
  width: 100%;
  height: 230px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
}
.word-wrap {
  text-align: center;
  transition: opacity 0.07s, filter 0.07s;
}
.words-area.hide .word-wrap { opacity: 0; filter: blur(10px); }
.w1 {
  font-family: 'Noto Sans JP', sans-serif; font-weight: 900;
  font-size: clamp(3.4em, 13vw, 4.8em);
  line-height: 1.1; color: #ffffff; letter-spacing: 0.02em;
  text-shadow: 0 0 20px rgba(255,204,0,0.4);
}
.w2 {
  font-family: 'Noto Sans JP', sans-serif; font-weight: 900;
  font-size: clamp(3.4em, 13vw, 4.8em);
  line-height: 1.2; color: var(--gold); letter-spacing: 0.02em;
  text-shadow: 0 0 24px rgba(255,204,0,0.6);
}

/* buttons — directly below words */
.game-bottom {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
  z-index: 2;
}
/* fixed-height slot so layout never jumps */
.btn-slot {
  width: 100%;
  height: 80px;
  position: relative;
}
.btn-sei, .ans-row {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transition: opacity 0.1s;
}
.btn-sei {
  background: transparent;
  border: 2px solid var(--gold); border-radius: 4px;
  color: var(--gold);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 900; font-size: 2em; letter-spacing: 0.4em;
  text-shadow: 0 0 12px rgba(255,204,0,0.4);
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.btn-sei:hover  { border-color: var(--amber); color: var(--amber); }
.btn-sei:active { background: rgba(200,144,60,0.1); transform: scale(0.98); }
.ans-row { display: flex; gap: 10px; }
.btn-gn, .btn-kw {
  flex: 1; height: 100%; background: transparent;
  border-radius: 2px; cursor: pointer; transition: all 0.15s;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 900; font-size: 1.2em; letter-spacing: 0.02em;
}
.btn-gn { border: 1px solid var(--rust); color: var(--rust); }
.btn-kw { border: 1px solid var(--sage); color: var(--sage); }
.btn-gn:hover  { background: rgba(176,85,53,0.12); }
.btn-kw:hover  { background: rgba(122,170,130,0.1); }
.btn-gn:active { background: var(--rust); color: #fff; transform: scale(0.97); }
.btn-kw:active { background: var(--sage); color: var(--night); transform: scale(0.97); }
.kbd-hint {
  font-family: 'DotGothic16', monospace; font-size: 0.55em;
  color: var(--muted); letter-spacing: 0.02em; text-align: center;
}

/* ── character: absolute layer floating right, overlapping words ── */
.chara-layer {
  position: absolute;
  right: 0;
  top: 120px;       /* bite into words area */
  width: 160px;
  z-index: 0;
  pointer-events: none;
}
.chara-face {
  width: 160px;
  height: 190px;
  position: relative;
}
.chara-face img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.15s;
}
.chara-face img.active { opacity: 1; }
.chara-bubble {
  position: absolute;
  top: -55px;
  right: 10px;
  width: 120px;
  opacity: 0;
  transition: opacity 0.15s;
}
.chara-bubble.active { opacity: 1; }
.chara-bubble img { width: 100%; }

/* feedback flash */
.fb-flash {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Sans JP', sans-serif; font-weight: 900;
  font-size: 9em; pointer-events: none; opacity: 0; z-index: 500;
}
.fb-flash.ok { opacity: 1; color: var(--sage); text-shadow: 0 0 80px rgba(122,170,130,0.4); }
.fb-flash.ng { opacity: 1; color: var(--rust); text-shadow: 0 0 80px rgba(176,85,53,0.4); }

/* ━━━━━ RESULT ━━━━━ */
#scr-result { align-items: center; justify-content: center; }
.r-eyebrow { font-family: 'DotGothic16', monospace; font-size: 0.65em; color: var(--muted); letter-spacing: 0.2em; margin-bottom: 10px; text-transform: uppercase; }
.r-chara { width: 160px; height: 160px; margin: 0 auto 10px; position: relative; }
.r-chara img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.2s; }
.r-chara img.active { opacity: 1; }
.r-score-big { font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 7em; color: var(--gold); line-height: 0.9; text-shadow: 0 0 30px rgba(255,204,0,0.5); }
.r-denom { font-size: 0.75em; color: #9c8870; font-weight: 400; margin-bottom: 6px; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
.r-rank  { font-size: 0.95em; color: var(--text); font-weight: 700; margin-bottom: 18px; letter-spacing: 0.05em; font-family: 'Noto Sans JP', sans-serif; }
.r-dots { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; margin-bottom: 22px; }
.rdot { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 1px solid; display: flex; align-items: center; justify-content: center; font-size: 0.9em; font-family: 'Cormorant Garamond', serif; }
.rdot.ok { border-color: var(--sage); color: var(--sage); }
.rdot.ng { border-color: var(--rust); color: var(--rust); }
.r-btns { display: flex; flex-direction: column; gap: 8px; width: 100%; }
.btn-next { width: 100%; padding: 14px; background: var(--amber); color: #000; border: none; border-radius: 4px; font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 1.05em; letter-spacing: 0.1em; cursor: pointer; transition: all 0.18s; }
.btn-next:hover { background: var(--gold); }
.btn-outline { width: 100%; padding: 11px; background: transparent; border-radius: 4px; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 0.82em; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--dim); color: var(--text); }

/* ━━━━━ ALL CLEAR ━━━━━ */
#scr-over { align-items: center; justify-content: center; }
.go-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; margin: 18px 0; }
.go-cell { background: var(--panel); border: 1px solid var(--border); border-radius: 2px; padding: 9px 4px; text-align: center; }
.go-cell .cl { font-family: 'Space Mono',monospace; font-size: 0.55em; color: #9c8870; margin-bottom: 3px; }
.go-cell .cv { font-family: 'Cormorant Garamond',serif; font-size: 1.5em; color: var(--gold); }
.go-total { font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 5em; color: var(--gold); line-height: 1; text-shadow: 0 0 30px rgba(255,204,0,0.5); }
.go-sub { color: #9c8870; font-size: 0.75em; font-weight: 400; margin-bottom: 24px; letter-spacing: 0.1em; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
.rule-gold { width: 40px; height: 1px; background: var(--amber); margin: 0 auto 22px; }

/* ambient blobs */
.blob { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
.blob1 { width: 400px; height: 400px; background: rgba(80,0,160,0.25); top: -120px; left: -120px; }
.blob2 { width: 320px; height: 320px; background: rgba(0,100,200,0.18); bottom: -80px; right: -80px; }
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div id="app">

  <!-- TITLE -->
  <div id="scr-title" class="screen">
    <p class="t-eyebrow">A reaction game</p>
    <h1 class="t-main">Say Goodnight</h1>
    <p class="t-sub">ひろくてあさいやつ</p>
    <div class="t-rule-box">
      言葉が出たら <span class="hi">SAY</span> を押す。<br>
      <span class="hi">ひろくて ／ あさい</span> &nbsp;→&nbsp; <span class="red">SAY グッナイ</span><br>
      それ以外のぜんぶ &nbsp;→&nbsp; <span class="grn">SAY コンニチワ</span><br>
      レベルが上がると、言葉は一瞬だけ光る
    </div>
    <p class="sec-label">Level Select</p>
    <div class="lv-grid" id="lv-grid"></div>
    <button class="btn-start" onclick="startGame()">start</button>
  </div>

  <!-- GAME -->
  <div id="scr-game" class="screen hidden">
    <div class="g-meta">
      <span class="g-lv" id="g-lv">Level 1</span>
      <span class="g-q"  id="g-q">1 / 10</span>
      <span class="g-sc" id="g-sc">0</span>
      <button class="btn-sound" id="btn-sound" onclick="toggleSound()">🔊</button>
    </div>
    <div class="g-dots" id="g-dots"></div>
    <div class="timer-track">
      <div class="timer-fill" id="g-timer"></div>
      <div class="timer-glow" id="g-glow"></div>
    </div>

    <div class="words-area" id="g-words">
      <div class="word-wrap">
        <div class="w1" id="w1"></div>
        <div class="w2" id="w2"></div>
      </div>
    </div>

    <!-- character: absolute layer, overlaps words area -->
    <div class="chara-layer">
      <div class="chara-bubble" id="chara-bubble">
        <img id="chara-bubble-img" src="" alt="">
      </div>
      <div class="chara-face">
        <img id="ci-neutral" src="" alt="">
        <img id="ci-think"   src="" alt="">
        <img id="ci-gn"      src="" alt="">
        <img id="ci-kw"      src="" alt="">
      </div>
    </div>

    <div class="game-bottom">
      <div class="btn-slot">
        <button class="btn-sei" id="btn-sei" onclick="onSei()">SAY</button>
        <div class="ans-row hidden" id="ans-row">
          <button class="btn-gn" onclick="onAns('gn')">グッナイ</button>
          <button class="btn-kw" onclick="onAns('kw')">コンニチワ</button>
        </div>
      </div>
      <p class="kbd-hint">space = SAY &nbsp; Z/← = グッナイ &nbsp; X/→ = コンニチワ</p>
    </div>
  </div>

  <!-- RESULT -->
  <div id="scr-result" class="screen hidden">
    <p class="r-eyebrow" id="r-lbl">Level 1</p>
    <div class="r-chara">
      <img id="rc-neutral" src="" alt="">
      <img id="rc-happy"   src="" alt="">
    </div>
    <div class="r-score-big" id="r-score">0</div>
    <div class="r-denom">/ 10 correct</div>
    <div class="r-rank" id="r-rank"></div>
    <div class="r-dots" id="r-dots"></div>
    <div class="r-btns">
      <button class="btn-next hidden" id="btn-next"></button>
      <button class="btn-outline" onclick="doRetry()">もう一度</button>
      <button class="btn-outline" onclick="doTitle()">タイトルへ戻る</button>
    </div>
  </div>

  <!-- ALL CLEAR -->
  <div id="scr-over" class="screen hidden">
    <p class="t-eyebrow" style="margin-bottom:10px">All Levels Clear</p>
    <h1 class="t-main" style="font-size:2.4em;margin-bottom:4px">Good night.</h1>
    <p class="t-sub" style="margin-bottom:0">お疲れ様でした</p>
    <div class="go-grid" id="go-grid"></div>
    <div class="rule-gold"></div>
    <div class="go-total" id="go-total">0</div>
    <div class="go-sub">/ 100 total score</div>
    <button class="btn-start" onclick="doTitle()" style="margin-top:6px">back to title</button>
  </div>

</div>

<div class="fb-flash" id="fb"></div>

document.getElementById('ci-kw').src      = IMGS.i54;
document.getElementById('chara-bubble-img').src = '';
document.getElementById('rc-neutral').src = IMGS.i51;
document.getElementById('rc-happy').src   = IMGS.i54;

let bubbleTimer = null;
function setChara(state) {
  document.querySelectorAll('.chara-face img').forEach(el => el.classList.remove('active'));
  const bubble = document.getElementById('chara-bubble');
  const bubbleImg = document.getElementById('chara-bubble-img');
  clearTimeout(bubbleTimer);
  bubble.classList.remove('active');

  if (state === 'neutral') document.getElementById('ci-neutral').classList.add('active');
  else if (state === 'think')   document.getElementById('ci-think').classList.add('active');
  else if (state === 'gn') {
    document.getElementById('ci-gn').classList.add('active');
    bubbleImg.src = IMGS.i56;
    bubble.classList.add('active');
    bubbleTimer = setTimeout(() => bubble.classList.remove('active'), 800);
  }
  else if (state === 'kw') {
    document.getElementById('ci-kw').classList.add('active');
    bubbleImg.src = IMGS.i55;
    bubble.classList.add('active');
    bubbleTimer = setTimeout(() => bubble.classList.remove('active'), 800);
  }
}

// ── Game data ──
const W1 = [
  'ひろくて','せまくて','よわくて','つよくて','かたくて',
  'くらくて','ながくて','はやくて','ふかくて','かるくて',
  'おもくて','あまくて','からくて','さむくて','あつくて',
  'こわくて','ぬるくて','うすくて','ぴろしき','えもくて'
];
const W2 = [
  'あさい','ふかい','にがい','あまい','からい',
  'かたい','やわい','はやい','おそい','ひくい',
  'たかい','くさい','つよい','よわい','さむい',
  'あつい','こわい','くらい','ひろい','せまい'
];
const LV = [
  [4200,2400],[3400,1800],[2700,1300],[2200, 950],
  [1900, 700],[1550, 450],[1200, 260],[1000, 140],
  [1000,  70],[1000,  25]
];
const Q = 10;
const RANKS = [
  '— keep going','— not bad','— getting there','— decent',
  '— nice','— pretty good','— solid','— very good',
  '— excellent','— almost there','— perfect ✦'
];

const gs = { unlocked:1, scores:{}, sel:1 };
let rs = {};

function genQuestions() {
  const tc = 2 + Math.floor(Math.random() * 4);
  const arr = [];
  for (let i=0; i<tc; i++) arr.push({f:'ひろくて',s:'あさい',t:true});
  while (arr.length < Q) {
    let f, s;
    do {
      f = W1[Math.random()*W1.length|0];
      s = W2[Math.random()*W2.length|0];
    } while (f==='ひろくて' && s==='あさい');
    arr.push({f,s,t:false});
  }
  for (let i=arr.length-1; i>0; i--) {
    const j = Math.random()*(i+1)|0;
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function show(id) {
  ['scr-title','scr-game','scr-result','scr-over']
    .forEach(s=>document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function renderTitle() {
  const g = document.getElementById('lv-grid');
  g.innerHTML = '';
  for (let i=1; i<=10; i++) {
    const b = document.createElement('button');
    b.className = 'lv-btn';
    if (i > gs.unlocked) b.classList.add('locked');
    if (gs.scores[i] !== undefined) b.classList.add('done');
    if (i === gs.sel) b.classList.add('sel');
    const sc = gs.scores[i]!==undefined ? `<span class="s">${gs.scores[i]}/10</span>` : '';
    b.innerHTML = `<span class="n">${i}</span>${sc}`;
    if (i <= gs.unlocked) b.onclick = ()=>{ gs.sel=i; renderTitle(); };
    g.appendChild(b);
  }
  show('scr-title');
}

function startGame() {
  rs = {
    lv: gs.sel, qs: genQuestions(), qi: 0,
    res: new Array(Q).fill(null), score: 0,
    phase: 'idle', dT: null, qT: null, raf: null
  };
  document.getElementById('g-lv').textContent = `Level ${rs.lv}`;
  buildDots();
  setChara('neutral');
  show('scr-game');
  nextQ();
}

function buildDots() {
  const el = document.getElementById('g-dots');
  el.innerHTML = '';
  for (let i=0; i<Q; i++) {
    const d = document.createElement('div');
    d.className = 'dot'; d.id = `d${i}`;
    el.appendChild(d);
  }
}
function refreshDots() {
  for (let i=0; i<Q; i++) {
    const d = document.getElementById(`d${i}`);
    if (!d) continue;
    d.className = 'dot';
    if      (rs.res[i]===true)  d.classList.add('ok');
    else if (rs.res[i]===false) d.classList.add('ng');
    else if (i===rs.qi)         d.classList.add('cur');
  }
}

function nextQ() {
  if (rs.qi >= Q) { endLevel(); return; }
  const [total, disp] = LV[rs.lv-1];
  const q = rs.qs[rs.qi];
  rs.phase = 'showing';

  document.getElementById('g-q').textContent  = `${rs.qi+1} / 10`;
  document.getElementById('g-sc').textContent = rs.score;
  document.getElementById('w1').textContent   = q.f;
  document.getElementById('w2').textContent   = q.s;
  document.getElementById('g-words').classList.remove('hide');
  document.getElementById('btn-sei').classList.remove('hidden');
  document.getElementById('btn-sei').disabled = false;
  document.getElementById('ans-row').classList.add('hidden');
  setChara('neutral');
  refreshDots();
  speakWords(q.f, q.s);

  const tf = document.getElementById('g-timer');
  const tg = document.getElementById('g-glow');
  tf.style.width = '100%';
  tf.style.background = 'var(--amber)';
  tg.style.display = 'block';
  const t0 = performance.now();
  cancelAnimationFrame(rs.raf);
  (function tick() {
    const p = Math.max(0, 1-(performance.now()-t0)/total);
    tf.style.width = (p*100)+'%';
    const col = p<0.25 ? 'var(--rust)' : p<0.55 ? '#c8783c' : 'var(--amber)';
    tf.style.background = col;
    tg.style.background = col;
    tg.style.boxShadow = `0 0 10px ${p<0.25?"var(--rust)":"var(--amber)"}`;
    if (p>0) rs.raf = requestAnimationFrame(tick);
    else tg.style.display = 'none';
  })();

  rs.dT = setTimeout(()=>{
    document.getElementById('g-words').classList.add('hide');
    if (rs.phase==='showing') rs.phase = 'hidden';
  }, disp);
  rs.qT = setTimeout(onTimeout, total);
}

function onTimeout() {
  rs.phase = 'timeout';
  clearTimeout(rs.dT);
  cancelAnimationFrame(rs.raf);
  document.getElementById('g-timer').style.width = '0%';
  document.getElementById('g-glow').style.display = 'none';
  setChara('neutral');
  record(false);
  flash('—', false);
  setTimeout(()=>{ clearFb(); rs.qi++; nextQ(); }, 400);
}

function onSei() {
  if (rs.phase!=='showing' && rs.phase!=='hidden') return;
  rs.phase = 'sei';
  setChara('think');
  document.getElementById('btn-sei').classList.add('hidden');
  document.getElementById('ans-row').classList.remove('hidden');
}

function onAns(a) {
  if (rs.phase!=='sei') return;
  clearTimeout(rs.dT); clearTimeout(rs.qT);
  cancelAnimationFrame(rs.raf);
  document.getElementById('g-glow').style.display = 'none';
  rs.phase = 'done';
  const ok = (a==='gn') === rs.qs[rs.qi].t;
  record(ok);
  setChara(a);
  flash(ok ? '○' : '×', ok);
  setTimeout(()=>{ clearFb(); rs.qi++; nextQ(); }, 500);
}

function record(ok) {
  rs.res[rs.qi] = ok;
  if (ok) rs.score++;
}

function flash(t, ok) {
  const el = document.getElementById('fb');
  el.textContent = t;
  el.className = `fb-flash ${ok?'ok':'ng'}`;
}
function clearFb() { document.getElementById('fb').className = 'fb-flash'; }

function endLevel() {
  clearTimeout(rs.dT); clearTimeout(rs.qT); cancelAnimationFrame(rs.raf); clearFb();
  gs.scores[rs.lv] = Math.max(gs.scores[rs.lv]??0, rs.score);
  if (rs.lv < 10) gs.unlocked = Math.max(gs.unlocked, rs.lv+1);

  document.getElementById('r-lbl').textContent   = `Level ${rs.lv}`;
  document.getElementById('r-score').textContent = rs.score;
  document.getElementById('r-rank').textContent  = RANKS[rs.score];

  document.querySelectorAll('.r-chara img').forEach(el=>el.classList.remove('active'));
  document.getElementById(rs.score >= 7 ? 'rc-happy' : 'rc-neutral').classList.add('active');

  const de = document.getElementById('r-dots');
  de.innerHTML = '';
  rs.res.forEach(r=>{
    const d = document.createElement('div');
    d.className = `rdot ${r?'ok':'ng'}`;
    d.textContent = r ? '○' : '×';
    de.appendChild(d);
  });

  const nb = document.getElementById('btn-next');
  nb.classList.remove('hidden');
  if (rs.lv===10) { nb.textContent='全スコアを見る'; nb.onclick=showOver; }
  else            { nb.textContent=`next — level ${rs.lv+1}`; nb.onclick=doNext; }
  show('scr-result');
}

function showOver() {
  const g = document.getElementById('go-grid');
  g.innerHTML = '';
  let tot = 0;
  for (let i=1; i<=10; i++) {
    const sc = gs.scores[i]??'-';
    tot += gs.scores[i]??0;
    const c = document.createElement('div');
    c.className = 'go-cell';
    c.innerHTML = `<div class="cl">LV${i}</div><div class="cv">${sc}</div>`;
    g.appendChild(c);
  }
  document.getElementById('go-total').textContent = tot;
  show('scr-over');
}

function doNext()  { gs.sel=rs.lv+1; startGame(); }
function doRetry() { gs.sel=rs.lv;   startGame(); }
function doTitle() { renderTitle(); }

document.addEventListener('keydown', e=>{
  if (e.code==='Space')                         { e.preventDefault(); onSei(); }
  if (e.code==='ArrowLeft' ||e.code==='KeyZ')   { e.preventDefault(); onAns('gn'); }
  if (e.code==='ArrowRight'||e.code==='KeyX')   { e.preventDefault(); onAns('kw'); }
  if (e.code==='Enter' && !document.getElementById('scr-title').classList.contains('hidden'))
    startGame();
});

// ── Speech ──
let soundOn = true;
let jaVoice = null;

function initVoice() {
  const voices = speechSynthesis.getVoices();
  jaVoice = voices.find(v => v.lang.startsWith('ja')) || null;
}
speechSynthesis.onvoiceschanged = initVoice;
initVoice();

function toggleSound() {
  soundOn = !soundOn;
  const btn = document.getElementById('btn-sound');
  btn.textContent = soundOn ? '🔊' : '🔇';
  btn.classList.toggle('muted', !soundOn);
  if (!soundOn) speechSynthesis.cancel();
}

function speakWords(w1, w2) {
  if (!soundOn) return;
  speechSynthesis.cancel();
  const say = (text, delay) => setTimeout(() => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 1.1;
    if (jaVoice) u.voice = jaVoice;
    speechSynthesis.speak(u);
  }, delay);
  say(w1, 0);
  say(w2, 420);
}

renderTitle();
</script>
